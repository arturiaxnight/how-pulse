<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart of Worship 節拍器</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-neutral-100">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col p-4 md:p-8">
      <header class="mb-4 md:mb-8">
        <h1 class="text-2xl font-semibold tracking-wide text-cyan-300 md:text-3xl">Heart of Worship 節拍器</h1>
        <p class="mt-2 text-sm text-neutral-400">
          即時同步視覺節拍器（團員預設模式）
        </p>
      </header>

      <section
        id="flashStage"
        class="relative mb-6 flex flex-1 items-center justify-center rounded-3xl border border-neutral-800 bg-neutral-900 transition-colors duration-75"
      >
        <div class="pointer-events-none text-center">
          <p id="statusText" class="text-sm uppercase tracking-[0.2em] text-neutral-400">STOPPED</p>
          <p id="beatText" class="mt-3 text-5xl font-bold text-neutral-200 md:text-7xl">-</p>
          <p id="bpmText" class="mt-3 text-base text-neutral-400">BPM 120</p>
        </div>
      </section>

      <section
        id="adminPanel"
        class="hidden rounded-2xl border border-neutral-800 bg-neutral-900/80 p-4 shadow-2xl shadow-black/40 backdrop-blur"
      >
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-medium text-cyan-200">鼓手控制台</h2>
          <span class="text-xs text-neutral-400">Admin mode</span>
        </div>

        <div class="mb-3 flex items-end justify-between gap-3">
          <div>
            <p class="text-sm text-neutral-300">BPM</p>
            <p id="bpmValue" class="text-5xl font-bold leading-none text-cyan-200 md:text-6xl">120</p>
          </div>
          <div class="flex gap-2">
            <button
              id="bpmMinusBtn"
              type="button"
              class="rounded-xl border border-neutral-700 px-4 py-3 text-2xl font-bold leading-none text-neutral-100 transition hover:bg-neutral-800"
              aria-label="降低 BPM"
            >
              -
            </button>
            <button
              id="bpmPlusBtn"
              type="button"
              class="rounded-xl border border-neutral-700 px-4 py-3 text-2xl font-bold leading-none text-neutral-100 transition hover:bg-neutral-800"
              aria-label="提高 BPM"
            >
              +
            </button>
          </div>
        </div>
        <input
          id="bpmSlider"
          type="range"
          min="40"
          max="180"
          step="1"
          value="120"
          class="w-full accent-cyan-400"
        />
        <p id="bpmLockHint" class="mt-2 text-xs text-neutral-500">
          播放中無法調整 BPM 或音效模式，請先停止再設定。
        </p>
        <div class="mt-4">
          <label for="soundModeSelect" class="mb-1 block text-sm text-neutral-300">音效模式</label>
          <select
            id="soundModeSelect"
            class="w-full rounded-xl border border-neutral-700 bg-neutral-950 px-3 py-2 text-sm text-neutral-100 outline-none transition focus:border-cyan-400"
          >
            <option value="A">模式 A（只用 metronome.mp3）</option>
            <option value="B">模式 B（主拍/副拍）</option>
          </select>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-2 text-xs text-neutral-400 md:grid-cols-4">
          <div>連線裝置: <span id="connectedClients" class="text-neutral-200">-</span></div>
          <div>已對時: <span id="readyClients" class="text-neutral-200">-</span></div>
          <div>建議延遲: <span id="recommendedDelay" class="text-neutral-200">-</span></div>
          <div>本機 RTT/Jitter: <span id="localSyncQuality" class="text-neutral-200">-</span></div>
        </div>

        <div class="mt-4 flex gap-3">
          <button
            id="startBtn"
            class="flex-1 rounded-xl bg-emerald-500 px-4 py-3 font-semibold text-emerald-950 transition hover:bg-emerald-400"
          >
            開始
          </button>
          <button
            id="stopBtn"
            class="flex-1 rounded-xl bg-rose-500 px-4 py-3 font-semibold text-rose-950 transition hover:bg-rose-400"
          >
            停止
          </button>
        </div>
      </section>
    </main>

    <section
      id="soundUnlockPanel"
      class="fixed inset-0 z-50 hidden bg-neutral-950/95 p-6 backdrop-blur-sm"
    >
      <div class="mx-auto flex min-h-full w-full max-w-md flex-col items-center justify-center text-center">
        <h2 class="text-2xl font-semibold text-amber-200 md:text-3xl">團員端啟用聲音</h2>
        <p id="soundUnlockHint" class="mt-4 text-sm leading-relaxed text-amber-100/90 md:text-base">
          進場後請先點一下按鈕，啟用後就會跟著螢幕節拍播放聲音。
        </p>
        <button
          id="enableSoundBtn"
          type="button"
          class="mt-8 w-full rounded-2xl bg-amber-300 px-5 py-4 text-lg font-semibold text-amber-950 transition hover:bg-amber-200"
        >
          點一下啟用聲音
        </button>
      </div>
    </section>

    <script src="./app.js?v=stable-20260528-member-audio-overlay"></script>
  </body>
</html>
